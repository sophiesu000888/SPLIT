
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops I Paid!</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Kalam:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec;
    --card: #fffdf8;
    --accent: #f0a500;
    --accent2: #e07b00;
    --green: #2e7d32;
    --red: #c62828;
    --blue: #1565c0;
    --border: #2d2d2d;
    --text: #1a1a1a;
    --muted: #888;
    --receipt: #fff9ee;
    --tab-h: 58px;
    --top-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
  }

  /* ── Top bar ── */
  #topbar {
    background: var(--accent);
    border-bottom: 3px solid var(--border);
    padding: 0 16px;
    height: var(--top-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  #topbar h1 {
    font-family: 'Kalam', cursive;
    font-size: 24px;
    color: var(--border);
    letter-spacing: 1px;
  }
  #topbarRight { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  #tripNameDisplay {
    font-size: 13px;
    font-weight: 900;
    color: var(--border);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    background: rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
  }
  #syncStatus {
    font-size: 10px;
    color: var(--border);
    opacity: 0.55;
  }

  /* ── Bottom tab bar ── */
  #tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    display: flex;
    border-top: 3px solid var(--border);
    background: #fff;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 900;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--muted);
    padding: 6px 4px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn .tab-icon { font-size: 22px; line-height: 1; }
  .tab-btn.active { color: var(--accent2); background: #fff9ee; }

  /* ── Main content ── */
  #main {
    padding: 16px 14px calc(var(--tab-h) + 16px);
    min-height: calc(100vh - var(--top-h));
  }

  /* ── Section ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── Members ── */
  .member-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px;
    font-weight: 900;
    font-size: 15px;
    margin: 5px;
  }
  .member-chip .del {
    cursor: pointer;
    font-size: 14px;
    opacity: 0.45;
    min-width: 24px;
    min-height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Input / fields ── */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  input[type=text], input[type=number], select {
    border: 2.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    background: #fff;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  .input-row input, .input-row select { flex: 1; }

  .btn {
    border: 2.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 900;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    background: var(--card);
    box-shadow: 3px 3px 0 var(--border);
    white-space: nowrap;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--border); }
  .btn-accent { background: var(--accent); }
  .btn-wide { width: 100%; margin-top: 6px; font-size: 16px; padding: 15px; }
  .btn-green { background: #c8e6c9; color: var(--green); border-color: var(--green); box-shadow: 3px 3px 0 var(--green); }
  .btn-red { background: #ffcdd2; color: var(--red); border-color: var(--red); box-shadow: 3px 3px 0 var(--red); }

  /* ── Receipt card ── */
  .receipt {
    background: var(--receipt);
    border: 2.5px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--border);
    position: relative;
  }
  .receipt-header {
    background: var(--accent);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
  }
  .receipt-title { font-weight: 900; font-size: 16px; flex: 1; }
  .receipt-amount { font-weight: 900; font-size: 20px; font-family: monospace; }
  .receipt-body { padding: 12px 16px; }
  .receipt-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 3px 0;
    color: var(--muted);
  }
  .receipt-row strong { color: var(--text); }
  .receipt-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 700;
  }
  .tag.assigned { background: #e3f2fd; border-color: #90caf9; color: var(--blue); }
  .receipt-del {
    position: absolute;
    top: 10px; right: 14px;
    cursor: pointer;
    font-size: 15px;
    opacity: 0.35;
    min-width: 36px; min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Split type ── */
  .split-toggle {
    display: flex;
    border: 2.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .split-toggle label {
    flex: 1;
    text-align: center;
    padding: 12px 4px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    background: #fff;
    transition: background 0.15s;
  }
  .split-toggle input[type=radio] { display: none; }
  .split-toggle input[type=radio]:checked + label { background: var(--accent); }

  /* ── Custom split ── */
  .custom-split-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 15px;
    font-weight: 700;
  }
  .custom-split-row:last-child { border-bottom: none; }
  .custom-split-row input {
    width: 110px;
    text-align: right;
    border: 2px solid #ddd;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 16px;
    font-family: monospace;
  }
  #customTotal { font-size: 14px; color: var(--muted); margin: 8px 0 4px; font-weight: 700; }
  #customTotal.ok { color: var(--green); }
  #customTotal.over { color: var(--red); }

  /* ── Section title ── */
  .sec-title {
    font-size: 17px;
    font-weight: 900;
    margin: 16px 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sec-title:first-child { margin-top: 0; }

  /* ── Field label ── */
  .field-label {
    font-size: 12px;
    font-weight: 900;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-group { margin-bottom: 14px; }

  /* ── Summary: card list instead of table ── */
  .summary-card {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .summary-card:active { border-color: var(--accent2); }
  .summary-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
  }
  .summary-name { font-size: 17px; font-weight: 900; }
  .summary-balance {
    font-size: 18px;
    font-weight: 900;
    font-family: monospace;
  }
  .summary-balance.pos { color: var(--green); }
  .summary-balance.neg { color: var(--red); }
  .summary-balance.zero { color: var(--muted); }
  .summary-card-sub {
    display: flex;
    padding: 0 16px 12px;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .summary-card-sub span strong { color: var(--text); }
  .summary-total {
    background: #fffde7;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    display: flex;
    justify-content: space-between;
    font-weight: 900;
    font-size: 16px;
    margin-bottom: 16px;
  }

  /* ── Result transfer ── */
  .result-card {
    background: #fff;
    border: 2.5px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--border);
  }
  .result-header {
    background: #e8f5e9;
    padding: 10px 16px;
    font-weight: 900;
    font-size: 14px;
    border-bottom: 2px solid var(--border);
    color: var(--green);
  }
  .result-row {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #eee;
    font-size: 16px;
    font-weight: 700;
    gap: 6px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-from { flex: 1; }
  .result-arrow { color: var(--accent2); font-size: 20px; }
  .result-to { flex: 1; text-align: right; }
  .result-amount {
    font-family: monospace;
    font-size: 18px;
    font-weight: 900;
    color: var(--blue);
    background: #e3f2fd;
    border-radius: 10px;
    padding: 4px 10px;
  }

  /* ── Empty state ── */
  .empty { text-align: center; color: var(--muted); padding: 48px 16px; font-size: 15px; }
  .empty div { font-size: 48px; margin-bottom: 10px; }

  /* ── Trip selector modal ── */
  #tripModal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  #tripModal.hidden { display: none; }
  .modal-box {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 -4px 0 var(--border);
  }
  .modal-box h2 { font-size: 20px; margin-bottom: 16px; font-weight: 900; }
  .trip-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 2.5px solid #e0e0e0;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 16px;
    min-height: 54px;
  }
  .trip-item.active { border-color: var(--accent2); background: #fff9ee; }

  /* ── Member detail card ── */
  .detail-card {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 3px 3px 0 var(--border);
  }
  .detail-header {
    background: #e3f2fd;
    border-bottom: 2px solid var(--border);
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 900;
    color: var(--blue);
  }
  .detail-section-label {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 900;
    color: var(--muted);
    background: #fafafa;
    border-bottom: 1px solid #eee;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-row {
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0f0;
    display: grid;
    grid-template-columns: 20px 1fr;
    grid-template-rows: auto auto;
    gap: 1px 6px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon { grid-row: 1 / 3; align-self: center; font-size: 16px; }
  .detail-desc { font-size: 14px; font-weight: 700; }
  .detail-sub { font-size: 12px; color: var(--muted); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>

<!-- Trip modal -->
<div id="tripModal">
  <div class="modal-box">
    <h2>🗺️ 選擇行程</h2>
    <div id="tripList"></div>
    <div class="input-row" style="margin-top:12px;">
      <input id="newTripName" type="text" placeholder="新行程名稱…">
      <button class="btn btn-accent" onclick="createTrip()">新增</button>
    </div>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <h1>✈️ Oops I Paid!</h1>
  <div id="topbarRight">
    <div id="tripNameDisplay" onclick="showTripModal()">點擊選擇行程 ▾</div>
    <div id="syncStatus">—</div>
  </div>
</div>

<!-- Bottom tab bar -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('members')">
    <span class="tab-icon">👥</span>成員
  </button>
  <button class="tab-btn" onclick="switchTab('expenses')">
    <span class="tab-icon">🧾</span>支出
  </button>
  <button class="tab-btn" onclick="switchTab('result')">
    <span class="tab-icon">💰</span>結算
  </button>
</div>

<!-- Main -->
<div id="main">

  <!-- Members tab -->
  <div id="tab-members" class="section active">
    <div class="sec-title">👥 出遊成員</div>
    <div class="input-row">
      <input id="memberInput" type="text" placeholder="輸入姓名…" onkeydown="if(event.key==='Enter')addMember()">
      <button class="btn btn-accent" onclick="addMember()" style="min-width:80px;">＋ 加入</button>
    </div>
    <div id="memberChips" style="margin-bottom:16px;"></div>
    <div id="memberEmpty" class="empty"><div>👋</div>先新增出遊成員</div>
  </div>

  <!-- Expenses tab -->
  <div id="tab-expenses" class="section">
    <!-- Add expense form -->
    <div class="receipt" style="margin-bottom:16px;">
      <div class="receipt-header">
        <span class="receipt-title">➕ 新增支出</span>
      </div>
      <div class="receipt-body">
        <div class="field-group">
          <div class="field-label">項目名稱</div>
          <div class="input-row" style="margin-bottom:0;">
            <input id="expDesc" type="text" placeholder="例：晚餐、交通…" style="flex:1;">
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">金額 (NT$)</div>
          <div class="input-row" style="margin-bottom:0;">
            <input id="expAmount" type="number" placeholder="0" min="0" style="flex:1;">
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">付款人</div>
          <select id="payerSelect" class="input-row" style="display:block;width:100%;border:2.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;background:#fff;font-family:'Noto Sans TC',sans-serif;outline:none;">
          </select>
        </div>
        <div class="field-group">
          <div class="field-label">分帳方式</div>
          <div class="split-toggle">
            <input type="radio" name="splitType" id="splitEqual" value="equal" checked onchange="onSplitTypeChange()">
            <label for="splitEqual">平均分攤</label>
            <input type="radio" name="splitType" id="splitCustom" value="custom" onchange="onSplitTypeChange()">
            <label for="splitCustom">指定金額</label>
          </div>
          <!-- Custom split table -->
          <div id="customSplitArea" style="display:none;">
            <div id="customSplitTable" style="background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:4px 14px;margin-bottom:8px;"></div>
            <div id="customTotal">尚未輸入</div>
          </div>
          <!-- Equal split preview -->
          <div id="equalPreview" style="font-size:13px;color:var(--muted);"></div>
        </div>
        <button class="btn btn-accent btn-wide" onclick="addExpense()">✅ 記錄此筆</button>
      </div>
    </div>

    <!-- Expense list -->
    <div class="sec-title" style="margin-top:4px;">🧾 支出紀錄</div>
    <div id="expenseList"></div>
    <div id="expenseEmpty" class="empty"><div>🧾</div>還沒有支出紀錄</div>
  </div>

  <!-- Result tab -->
  <div id="tab-result" class="section">
    <div class="sec-title">📊 個人小計 <span style="font-size:12px;font-weight:400;color:var(--muted);">點擊看明細</span></div>
    <div id="summaryArea"></div>
    <div id="memberDetail" style="display:none;"></div>
    <div class="sec-title">💸 誰該付給誰</div>
    <div id="resultArea"></div>
    <div id="resultEmpty" class="empty" style="display:none;"><div>🎉</div>大家都算清楚了！</div>
  </div>

</div>

<script>
// ── State ──
let state = {
  tripId: null,
  members: [],   // [{id, name}]
  expenses: [],  // [{id, desc, amount, payerId, splits: [{memberId, amount}]}]
};
let db = null;
let unsubscribe = null;

// ── Firebase init ──
requireAuth((user) => {
  db = firebase.firestore();
  loadTrips();
});

// ── Trip management ──
let trips = [];

async function loadTrips() {
  const snap = await db.collection('trips').orderBy('createdAt','desc').get();
  trips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  if (trips.length === 0) {
    showTripModal();
  } else {
    renderTripList();
    selectTrip(trips[0].id);
  }
}

function showTripModal() {
  renderTripList();
  document.getElementById('tripModal').classList.remove('hidden');
}

function renderTripList() {
  const el = document.getElementById('tripList');
  if (trips.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:12px;">還沒有行程，新增一個開始吧！</div>';
    return;
  }
  el.innerHTML = trips.map(t => `
    <div class="trip-item ${t.id === state.tripId ? 'active' : ''}" onclick="selectTrip('${t.id}')">
      <span>🗺️ <span id="tripLabel-${t.id}">${t.name}</span></span>
      <span style="display:flex;align-items:center;gap:6px;">
        <span style="color:var(--muted);font-size:12px;">${t.memberCount||0} 人</span>
        <span onclick="event.stopPropagation();startRenameTrip('${t.id}')" style="cursor:pointer;font-size:14px;opacity:0.5;" title="重新命名">✏️</span>
      </span>
    </div>
  `).join('');
}

async function startRenameTrip(id) {
  const trip = trips.find(t => t.id === id);
  if (!trip) return;
  const newName = prompt('修改行程名稱：', trip.name);
  if (!newName || newName.trim() === trip.name) return;
  const name = newName.trim();
  trip.name = name;
  await db.collection('trips').doc(id).update({ name });
  if (state.tripId === id) {
    document.getElementById('tripNameDisplay').textContent = name;
  }
  renderTripList();
}

async function createTrip() {
  const name = document.getElementById('newTripName').value.trim();
  if (!name) return;
  const ref = await db.collection('trips').add({ name, createdAt: Date.now(), memberCount: 0 });
  document.getElementById('newTripName').value = '';
  trips.unshift({ id: ref.id, name, memberCount: 0 });
  selectTrip(ref.id);
}

function selectTrip(id) {
  state.tripId = id;
  const trip = trips.find(t => t.id === id);
  document.getElementById('tripNameDisplay').textContent = trip ? trip.name : '—';
  document.getElementById('tripModal').classList.add('hidden');
  renderTripList();
  subscribeToTrip(id);
}

// ── Firestore sync ──
function subscribeToTrip(tripId) {
  if (unsubscribe) unsubscribe();
  setSyncStatus('同步中…');
  unsubscribe = db.collection('trips').doc(tripId)
    .onSnapshot(doc => {
      if (!doc.exists) return;
      const data = doc.data();
      state.members = data.members || [];
      state.expenses = data.expenses || [];
      renderAll();
      setSyncStatus('✅ 已同步 ' + new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
    }, err => setSyncStatus('⚠️ 同步失敗'));
}

function saveToFirebase() {
  if (!state.tripId || !db) return;
  setSyncStatus('儲存中…');
  db.collection('trips').doc(state.tripId).update({
    members: state.members,
    expenses: state.expenses,
    memberCount: state.members.length,
  }).then(() => setSyncStatus('✅ 已儲存'))
    .catch(() => setSyncStatus('⚠️ 儲存失敗'));
}

function setSyncStatus(txt) {
  document.getElementById('syncStatus').textContent = txt;
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const names = ['members','expenses','result'];
    b.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'expenses') updatePayerSelect();
  if (name === 'result') renderResult();
}

// ── Members ──
function addMember() {
  const inp = document.getElementById('memberInput');
  const name = inp.value.trim();
  if (!name) return;
  if (state.members.find(m => m.name === name)) return showToast('已有同名成員');
  state.members.push({ id: Date.now().toString(), name });
  inp.value = '';
  saveToFirebase();
  renderMembers();
  updatePayerSelect();
}

function removeMember(id) {
  if (state.expenses.some(e => e.payerId === id || e.splits.some(s => s.memberId === id))) {
    return showToast('⚠️ 此成員已有支出紀錄，無法刪除');
  }
  state.members = state.members.filter(m => m.id !== id);
  saveToFirebase();
  renderMembers();
  updatePayerSelect();
}

function renderMembers() {
  const chips = document.getElementById('memberChips');
  const empty = document.getElementById('memberEmpty');
  if (state.members.length === 0) {
    chips.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  chips.innerHTML = state.members.map(m => `
    <span class="member-chip">
      ${m.name}
      <span class="del" onclick="removeMember('${m.id}')">✖</span>
    </span>
  `).join('');
}

// ── Expenses ──
function updatePayerSelect() {
  const sel = document.getElementById('payerSelect');
  sel.innerHTML = state.members.length === 0
    ? '<option value="">先新增成員</option>'
    : state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  updateEqualPreview();
  buildCustomSplitTable();
}

function onSplitTypeChange() {
  const type = document.querySelector('input[name=splitType]:checked').value;
  document.getElementById('customSplitArea').style.display = type === 'custom' ? '' : 'none';
  document.getElementById('equalPreview').style.display = type === 'equal' ? '' : 'none';
  if (type === 'custom') buildCustomSplitTable();
  if (type === 'equal') updateEqualPreview();
}

function updateEqualPreview() {
  const amount = parseFloat(document.getElementById('expAmount').value) || 0;
  const n = state.members.length;
  if (!n || !amount) { document.getElementById('equalPreview').textContent = ''; return; }
  document.getElementById('equalPreview').textContent =
    `每人 NT$ ${Math.ceil(amount / n).toLocaleString()}（共 ${n} 人）`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('expAmount').addEventListener('input', () => {
    updateEqualPreview();
    updateCustomTotal();
  });
});

function buildCustomSplitTable() {
  const tbl = document.getElementById('customSplitTable');
  tbl.innerHTML = state.members.map(m => `
    <div class="custom-split-row">
      <span>${m.name}</span>
      <input type="number" inputmode="decimal" min="0" placeholder="0"
        data-mid="${m.id}" oninput="updateCustomTotal()">
    </div>
  `).join('');
  updateCustomTotal();
}

function updateCustomTotal() {
  const amount = parseFloat(document.getElementById('expAmount').value) || 0;
  const inputs = document.querySelectorAll('#customSplitTable input[data-mid]');
  let total = 0;
  inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
  const el = document.getElementById('customTotal');
  const diff = amount - total;
  if (Math.abs(diff) < 0.01) {
    el.textContent = `✅ 合計 NT$ ${total.toLocaleString()}，與金額相符`;
    el.className = 'ok';
  } else if (diff > 0) {
    el.textContent = `還差 NT$ ${diff.toLocaleString()} 未分配`;
    el.className = 'over';
  } else {
    el.textContent = `超出 NT$ ${Math.abs(diff).toLocaleString()}`;
    el.className = 'over';
  }
}

function addExpense() {
  const desc = document.getElementById('expDesc').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const payerId = document.getElementById('payerSelect').value;
  if (!desc) return showToast('請輸入項目名稱');
  if (!amount || amount <= 0) return showToast('請輸入金額');
  if (!payerId) return showToast('請選擇付款人');
  if (!state.tripId) return showToast('請先選擇行程');

  const type = document.querySelector('input[name=splitType]:checked').value;
  let splits = [];

  if (type === 'equal') {
    const each = amount / state.members.length;
    splits = state.members.map(m => ({ memberId: m.id, amount: parseFloat(each.toFixed(2)) }));
  } else {
    const inputs = document.querySelectorAll('#customSplitTable input[data-mid]');
    let total = 0;
    inputs.forEach(inp => {
      const v = parseFloat(inp.value) || 0;
      total += v;
      splits.push({ memberId: inp.dataset.mid, amount: v });
    });
    if (Math.abs(total - amount) > 0.01) return showToast('⚠️ 指定金額合計與總金額不符');
  }

  state.expenses.push({
    id: Date.now().toString(),
    desc, amount, payerId, splits,
    createdAt: Date.now(),
  });

  saveToFirebase();

  // Reset form
  document.getElementById('expDesc').value = '';
  document.getElementById('expAmount').value = '';
  document.getElementById('splitEqual').checked = true;
  onSplitTypeChange();
  renderExpenses();
  showToast('✅ 已記錄！');
}

function removeExpense(id) {
  if (!confirm('確定刪除這筆支出？')) return;
  state.expenses = state.expenses.filter(e => e.id !== id);
  saveToFirebase();
  renderExpenses();
}

function renderExpenses() {
  const list = document.getElementById('expenseList');
  const empty = document.getElementById('expenseEmpty');
  if (state.expenses.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  // sort newest first
  const sorted = [...state.expenses].sort((a,b) => b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(e => {
    const payer = state.members.find(m => m.id === e.payerId);
    const payerName = payer ? payer.name : '未知';
    const assignedNames = e.splits
      .filter(s => s.amount > 0)
      .map(s => {
        const m = state.members.find(x => x.id === s.memberId);
        return m ? `<span class="tag assigned">${m.name} NT$${s.amount.toLocaleString()}</span>` : '';
      }).join('');
    return `
      <div class="receipt">
        <span class="receipt-del" onclick="removeExpense('${e.id}')">✖</span>
        <div class="receipt-header">
          <span class="receipt-title">${e.desc}</span>
          <span class="receipt-amount">NT$ ${e.amount.toLocaleString()}</span>
        </div>
        <div class="receipt-body">
          <div class="receipt-row">
            <span>付款人</span>
            <strong>${payerName} 先付</strong>
          </div>
          <div class="receipt-tags" style="margin-top:6px;">${assignedNames}</div>
        </div>
      </div>`;
  }).join('');
}

// ── Result calculation ──
function renderResult() {
  if (!state.members.length || !state.expenses.length) {
    document.getElementById('summaryArea').innerHTML = '';
    document.getElementById('resultArea').innerHTML = '<div class="empty"><div>📭</div>還沒有資料可結算</div>';
    document.getElementById('resultEmpty').style.display = 'none';
    return;
  }

  // net[memberId] = paid - owed
  const paid = {}, owed = {};
  state.members.forEach(m => { paid[m.id] = 0; owed[m.id] = 0; });
  state.expenses.forEach(e => {
    paid[e.payerId] = (paid[e.payerId] || 0) + e.amount;
    e.splits.forEach(s => { owed[s.memberId] = (owed[s.memberId] || 0) + s.amount; });
  });

  const net = {};
  state.members.forEach(m => { net[m.id] = (paid[m.id]||0) - (owed[m.id]||0); });

  // Summary table
  const totalPaid = Object.values(paid).reduce((a,b)=>a+b,0);
  const summaryCards = state.members.map(m => {
    const n = net[m.id] || 0;
    const cls = n > 0.5 ? 'pos' : n < -0.5 ? 'neg' : 'zero';
    const label = n > 0.5 ? '別人欠你' : n < -0.5 ? '你欠別人' : '已結清';
    const sign = n > 0.5 ? '＋' : '';
    return `<div class="summary-card" onclick="showMemberDetail('${m.id}')">
      <div class="summary-card-header">
        <span class="summary-name">${m.name}</span>
        <span class="summary-balance ${cls}">${sign}NT$ ${Math.abs(Math.round(n)).toLocaleString()}</span>
      </div>
      <div class="summary-card-sub">
        <span>已付 <strong>NT$ ${Math.round(paid[m.id]||0).toLocaleString()}</strong></span>
        <span>應攤 <strong>NT$ ${Math.round(owed[m.id]||0).toLocaleString()}</strong></span>
        <span style="color:${cls==='pos'?'var(--green)':cls==='neg'?'var(--red)':'var(--muted)'};">${label}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('summaryArea').innerHTML = summaryCards +
    `<div class="summary-total"><span>總支出</span><span>NT$ ${Math.round(totalPaid).toLocaleString()}</span></div>`;

  // Settle debts (greedy algorithm)
  const creditors = [], debtors = [];
  state.members.forEach(m => {
    if (net[m.id] > 0.005) creditors.push({ id: m.id, name: m.name, amt: net[m.id] });
    if (net[m.id] < -0.005) debtors.push({ id: m.id, name: m.name, amt: -net[m.id] });
  });

  const txs = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const c = creditors[ci], d = debtors[di];
    const amt = Math.min(c.amt, d.amt);
    txs.push({ from: d.name, to: c.name, amount: Math.round(amt) });
    c.amt -= amt; d.amt -= amt;
    if (c.amt < 0.005) ci++;
    if (d.amt < 0.005) di++;
  }

  const resultEl = document.getElementById('resultArea');
  const emptyEl = document.getElementById('resultEmpty');
  if (txs.length === 0) {
    resultEl.innerHTML = '';
    emptyEl.style.display = '';
  } else {
    emptyEl.style.display = 'none';
    resultEl.innerHTML = `<div class="result-card">
      <div class="result-header">最少 ${txs.length} 筆轉帳搞定 🎯</div>
      ${txs.map(t => `
        <div class="result-row">
          <span class="result-from">${t.from}</span>
          <span class="result-arrow">→</span>
          <span class="result-to">${t.to}</span>
          <span class="result-amount">NT$${t.amount.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>`;
  }
}

// ── Member detail ──
function showMemberDetail(memberId) {
  const el = document.getElementById('memberDetail');
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;

  // Already open for this person → toggle off
  if (el.dataset.openFor === memberId && el.style.display !== 'none') {
    el.style.display = 'none';
    el.dataset.openFor = '';
    return;
  }
  el.dataset.openFor = memberId;
  el.style.display = '';

  // Expenses this person paid
  const asPayer = state.expenses.filter(e => e.payerId === memberId);
  // Expenses where this person owes something
  const asParticipant = state.expenses.filter(e =>
    e.payerId !== memberId && e.splits.some(s => s.memberId === memberId && s.amount > 0)
  );

  const payerRows = asPayer.map(e => {
    const perMe = e.splits.find(s => s.memberId === memberId)?.amount || 0;
    const others = e.amount - perMe;
    return `<div class="detail-row">
      <span class="detail-icon">💳</span>
      <span class="detail-desc">${e.desc}</span>
      <span class="detail-sub">先付 NT$${e.amount.toLocaleString()}，其他人欠你 NT$${others.toLocaleString()}</span>
    </div>`;
  }).join('');

  const oweRows = asParticipant.map(e => {
    const myAmt = e.splits.find(s => s.memberId === memberId)?.amount || 0;
    const payer = state.members.find(x => x.id === e.payerId);
    return `<div class="detail-row">
      <span class="detail-icon">💸</span>
      <span class="detail-desc">${e.desc}</span>
      <span class="detail-sub">應付 ${payer?.name||'?'} NT$${myAmt.toLocaleString()}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        📋 ${m.name} 的明細
        <span onclick="showMemberDetail('${memberId}')" style="cursor:pointer;float:right;opacity:0.4;font-size:13px;">✖ 關閉</span>
      </div>
      ${asPayer.length ? `<div class="detail-section-label">✅ 我先付了</div>${payerRows}` : ''}
      ${asParticipant.length ? `<div class="detail-section-label">📌 我需要還</div>${oweRows}` : ''}
      ${!asPayer.length && !asParticipant.length ? '<div style="color:var(--muted);font-size:13px;padding:8px 0;">這位成員沒有相關支出</div>' : ''}
    </div>`;
}

// ── renderAll ──
function renderAll() {
  renderMembers();
  renderExpenses();
  updatePayerSelect();
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab && activeTab.textContent.includes('結算')) renderResult();
}

// ── Toast ──
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d2d2d;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:999;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}
</script>
